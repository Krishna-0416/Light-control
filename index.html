<!DOCTYPE html>
<html>
<head>
   <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Light on/off</title>
    <style>body {
    text-align: center;}</style>
    

</head>
<body>
      <a href="#">Project 3 </a>
<h2>Light Control 💡</h2>

<img id="bulb" src="https://www.w3schools.com/js/pic_bulboff.gif" width="120">

<br><br>

<button onclick="turnOn()">ON</button>
<button onclick="turnOff()">OFF</button>
<script>
function turnOn() {
    document.getElementById("bulb").src = "https://www.w3schools.com/js/pic_bulbon.gif";
}

function turnOff() {
    document.getElementById("bulb").src = "https://www.w3schools.com/js/pic_bulboff.gif";
}
</script>
</body>
</html>
